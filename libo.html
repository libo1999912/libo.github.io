<!DOCTYPE html>
<html>
<head>
    <title>李博道歉网页</title>
    <style>
        /* CSS代码 */
        .container {
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            height: 100vh;
        }
        .rose {
            width: 100%;
            height: 100%;
            background-image: url("玫瑰花.gif");
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
        }
        .subtitle {
            font-size: 24px;
            text-align: center;
        }
    </style>
    <script>
        /* JavaScript代码 */
        var audio = new Audio("Groove Coverage - God Is a Girl (Chillout Mix).flac");
        function playMusic() {
            audio.play();
        }
        function stopMusic() {
            audio.pause();
            audio.currentTime = 0;
        }
    </script>
</head>
<body>
    <div class="container">
        <div class="rose"></div>
        <button onclick="playMusic()">播放音乐</button>
        <button onclick="stopMusic()">停止音乐</button>
    </div>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>李博道歉网页</title>
    <style>
        /* CSS代码 */
        .rose {
            width: 360px;
            height: 640px;
            background-image: url("玫瑰花.gif");
        }
        .subtitle {
            font-size: 24px;
            text-align: center;
        }
    </style>
    <script>
        /* JavaScript代码 */
        var audio = new Audio("Groove Coverage - God Is a Girl (Chillout Mix).flac");
        function playMusic() {
            audio.play();
        }
        function stopMusic() {
            audio.pause();
            audio.currentTime = 0;
        }
    </script>
</head>
<body>
    <div class="rose"></div>
    <div class="subtitle">李博道歉网页</div>
    <button onclick="playMusic()">播放音乐</button>
    <button onclick="stopMusic()">停止音乐</button>
</body>
</html>

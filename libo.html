<!DOCTYPE html>
<html>
<head>
    <title>李博道歉网页</title>
    <style>
     <style>
    html, body {
      height: 100%;
    }

    .rose {
      width: 100%;
      height: 100%;
      background-image: url('玫瑰花.jpg');
      background-size: cover;
      animation: rotate 5s linear infinite;
    }
    </style>
    <script>
        /* JavaScript代码 */
        var audio = new Audio("Groove Coverage - God Is a Girl (Chillout Mix).flac");
        function playMusic() {
            audio.play();
        }
        function stopMusic() {
            audio.pause();
            audio.currentTime = 0;
        }
    </script>
</head>
<body>
    <div class="rose"></div>
    <div class="subtitle">李博道歉网页</div>
    <button onclick="playMusic()">播放音乐</button>
    <button onclick="stopMusic()">停止音乐</button>
</body>
</html>
